name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Rust tests
        run: cargo test

  python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build and install
        run: uv sync
      - name: Clean-API test suite
        run: uv run pytest -q tests
      - name: Upstream py-vobject suite
        run: uv run pytest -q tests_upstream/pyvobject
      - name: Upstream icalendar suite
        run: uv run pytest -q python/icalendar/tests
